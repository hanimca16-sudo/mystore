<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إتمام الطلب</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    body { background: #f5f5f5; }
    .navbar { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; padding: 15px 30px; }
    .navbar-brand { font-size: 24px; font-weight: 900; color: #FFD700 !important; }
    .checkout-card { background: white; border: none; border-radius: 20px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    .form-control { border-radius: 12px; padding: 12px; border: 2px solid #eee; font-size: 15px; }
    .form-control:focus { border-color: #0f3460; box-shadow: none; }
    .btn-order { background: linear-gradient(135deg, #FFD700, #FFC200); color: #1a1a2e; border: none; border-radius: 12px; padding: 14px 0; width: 100%; font-size: 18px; font-weight: 900; }
    .btn-order:hover { background: linear-gradient(135deg, #0f3460, #16213e); color: white; }
    .total-box { background: #f0f4ff; border-radius: 15px; padding: 20px; text-align: center; }
    .total-price { font-size: 32px; font-weight: 900; color: #0f3460; }
    .product-item { background: #f9f9f9; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 d-flex justify-content-between">
  <a class="navbar-brand" href="/">🛍️ متجري</a>
  <a href="/cart/" class="btn btn-outline-light btn-sm">🛒 رجوع للسلة</a>
</nav>

<div class="container mt-4">
  <div class="row g-4">
    <div class="col-md-7">
      <div class="checkout-card">
        <h4 class="fw-bold mb-4">📦 معلومات التوصيل</h4>
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-bold">الولاية</label>
            <input type="text" name="wilaya" class="form-control" placeholder="مثال: الجزائر" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">البلدية</label>
            <input type="text" name="commune" class="form-control" placeholder="مثال: باب الزوار" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">رقم الهاتف</label>
            <input type="text" name="phone" class="form-control" placeholder="مثال: 0555000000" required>
          </div>
          <div class="alert alert-info mt-3">
            💰 الدفع عند الاستلام — لا حاجة لبطاقة بنكية
          </div>
          <button type="submit" class="btn btn-order mt-3">تأكيد الطلب ✅</button>
        </form>
      </div>
    </div>

    <div class="col-md-5">
      <div class="checkout-card">
        <h4 class="fw-bold mb-4">🛒 ملخص الطلب</h4>
        {% for product in products %}
        <div class="product-item d-flex justify-content-between">
          <span>{{ product.title }}</span>
          <span class="fw-bold">{{ product.price }} DA</span>
        </div>
        {% endfor %}
        <hr>
        <div class="total-box">
          <p class="text-muted mb-1">المجموع الكلي</p>
          <div class="total-price">{{ total }} DA</div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
