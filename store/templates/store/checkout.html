<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إتمام الشراء</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="/">🛍️ متجري</a>
  <a href="/cart/" class="btn btn-outline-light btn-sm">🛒 السلة</a>
</nav>

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h3 class="mb-4">إتمام الشراء</h3>
        <h5 class="text-success mb-4">الإجمالي: {{ total }} $</h5>
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">العنوان</label>
            <input type="text" name="address" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">رقم الهاتف</label>
            <input type="text" name="phone" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-success w-100">تأكيد الطلب ✅</button>
        </form>
        <a href="/cart/" class="btn btn-secondary w-100 mt-2">رجوع للسلة</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
