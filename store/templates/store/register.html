<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="/">🛍️ متجري</a>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <h3 class="mb-4 text-center">إنشاء حساب جديد</h3>
        <form method="POST">
          {% csrf_token %}
          {% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}
          <div class="mb-3">
            <label class="form-label">اسم المستخدم</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">كلمة المرور</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">إنشاء حساب</button>
        </form>
        <p class="text-center mt-3">لديك حساب؟ <a href="/accounts/login/">تسجيل الدخول</a></p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
