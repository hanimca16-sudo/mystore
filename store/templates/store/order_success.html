<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تم الطلب بنجاح</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    body { background: #f5f5f5; }
    .navbar { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; padding: 15px 30px; }
    .navbar-brand { font-size: 24px; font-weight: 900; color: #FFD700 !important; }
    .success-card { background: white; border: none; border-radius: 20px; padding: 50px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); text-align: center; }
    .success-icon { font-size: 80px; }
    .btn-home { background: linear-gradient(135deg, #FFD700, #FFC200); color: #1a1a2e; border: none; border-radius: 12px; padding: 12px 40px; font-size: 16px; font-weight: 900; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 d-flex justify-content-between">
  <a class="navbar-brand" href="/">🛍️ متجري</a>
</nav>

<div class="container mt-5" style="max-width:600px;">
  <div class="success-card">
    <div class="success-icon mb-4">✅</div>
    <h2 class="fw-bold mb-3">تم إرسال طلبك بنجاح!</h2>
    <p class="text-muted mb-2">سيتواصل معك البائع قريباً لتأكيد الطلب</p>
    <p class="text-muted mb-4">الدفع عند الاستلام 💰</p>
    <div class="alert alert-warning">
      <strong>ملاحظة:</strong> احتفظ برقم هاتفك لأن البائع سيتصل بك
    </div>
    <a href="/" class="btn btn-home mt-3">العودة للمتجر 🛍️</a>
  </div>
</div>

</body>
</html>
