<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>أصبح بائعاً</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="/">🛍️ متجري</a>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h3 class="mb-4 text-center">🏪 افتح متجرك الآن</h3>
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">اسم المتجر</label>
            <input type="text" name="shop_name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">وصف المتجر</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">رقم الهاتف</label>
            <input type="text" name="phone" class="form-control">
          </div>
          <button type="submit" class="btn btn-success w-100">افتح متجري 🚀</button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
